<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRR Footprint Correction</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            background-color: #f5f5f5;
        }
        .sidebar {
            width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            margin-right: 20px;
        }
        .main {
            flex-grow: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] { flex-grow: 1; }
        .slider-container input[type="number"] { width: 70px; }
        .axis-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .axis-inputs div { flex: 1; }
        .axis-inputs input { width: 100%; box-sizing: border-box; }
        #plot { flex-grow: 1; width: 100%; }
        .file-input { margin-bottom: 20px; }
        .nav-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .nav-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="nav-btn">Simulated Footprint Effect &rarr;</a>

    <h2>Data Input</h2>
    <input type="file" id="fileInput" class="file-input" accept=".csv" />

    <h2>Instrument Parameters</h2>

    <div class="control-group">
        <label>Sample Length, L (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-L" min="5" max="100" step="1" value="25" />
            <input type="number" id="num-L" min="5" max="100" step="1" value="25" />
        </div>
    </div>

    <div class="control-group">
        <label>Beam Thickness, Tx (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-Tx" min="0.01" max="1.0" step="0.01" value="0.1" />
            <input type="number" id="num-Tx" min="0.01" max="1.0" step="0.01" value="0.1" />
        </div>
    </div>

    <div class="control-group">
        <label>Lateral Displacement, &Delta; (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-Delta" min="0" max="5" step="0.1" value="0" />
            <input type="number" id="num-Delta" min="0" max="5" step="0.1" value="0" />
        </div>
    </div>

    <h2>Axis Management</h2>
    <div class="control-group">
        <label>Incident Angle (X-axis)</label>
        <div class="axis-inputs">
            <div><small>Min</small><input type="number" id="x-min" step="0.01" /></div>
            <div><small>Max</small><input type="number" id="x-max" step="0.01" /></div>
        </div>
    </div>

    <div class="control-group">
        <label>Intensity (Y-axis)</label>
        <div class="axis-inputs">
            <div><small>Min</small><input type="number" id="y-min" step="any" /></div>
            <div><small>Max</small><input type="number" id="y-max" step="any" /></div>
        </div>
    </div>

    <h2>Scaling Toggle</h2>
    <div class="control-group">
        <label>Y-Axis Scale</label>
        <select id="scale-toggle">
            <option value="log">Logarithmic Scale</option>
            <option value="linear">Linear Normalized (0 to 1)</option>
        </select>
    </div>
</div>

<div class="main">
    <div id="plot"></div>
</div>

<script>
    let originalData = { x: [], y: [] };
    let correctedData = { x: [], y: [] };

    // Get DOM elements
    const fileInput = document.getElementById('fileInput');

    // Sliders & Numbers
    const sliderL = document.getElementById('slider-L');
    const numL = document.getElementById('num-L');
    const sliderTx = document.getElementById('slider-Tx');
    const numTx = document.getElementById('num-Tx');
    const sliderDelta = document.getElementById('slider-Delta');
    const numDelta = document.getElementById('num-Delta');

    // Axis inputs
    const xMinInput = document.getElementById('x-min');
    const xMaxInput = document.getElementById('x-max');
    const yMinInput = document.getElementById('y-min');
    const yMaxInput = document.getElementById('y-max');

    // Toggle
    const scaleToggle = document.getElementById('scale-toggle');

    // Sync Sliders and Numbers
    function syncInputs(slider, num) {
        slider.addEventListener('input', () => {
            num.value = slider.value;
            updateDataAndPlot();
        });
        num.addEventListener('input', () => {
            slider.value = num.value;
            updateDataAndPlot();
        });
    }

    syncInputs(sliderL, numL);
    syncInputs(sliderTx, numTx);
    syncInputs(sliderDelta, numDelta);

    // Update on axis/scale change
    xMinInput.addEventListener('change', updatePlotLayout);
    xMaxInput.addEventListener('change', updatePlotLayout);
    yMinInput.addEventListener('change', updatePlotLayout);
    yMaxInput.addEventListener('change', updatePlotLayout);
    scaleToggle.addEventListener('change', updateDataAndPlot);

    // CSV Parsing
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const contents = e.target.result;
            parseCSV(contents);
            updateDataAndPlot();
        };
        reader.readAsText(file);
    });

    function parseCSV(contents) {
        const lines = contents.split('\n');
        originalData.x = [];
        originalData.y = [];

        let isFirstLine = true;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // Skip header if present
            if (isFirstLine && isNaN(parseFloat(line.split(',')[0]))) {
                isFirstLine = false;
                continue;
            }

            const parts = line.split(',');
            if (parts.length >= 2) {
                const xVal = parseFloat(parts[0]);
                const yVal = parseFloat(parts[1]);

                if (!isNaN(xVal) && !isNaN(yVal)) {
                    originalData.x.push(xVal);
                    originalData.y.push(yVal);
                }
            }
            isFirstLine = false;
        }
    }

    function calculateCorrection() {
        if (originalData.x.length === 0) return;

        const L = parseFloat(numL.value);
        const Tx = parseFloat(numTx.value);
        const Delta = parseFloat(numDelta.value);

        const sinGamma1 = Tx / (L + 2 * Delta);
        const sinGamma2 = Tx / (L - 2 * Delta);

        correctedData.x = [...originalData.x];
        correctedData.y = [];

        for (let i = 0; i < originalData.x.length; i++) {
            // Convert angle from degrees to radians for sin calculation
            const gammaDeg = originalData.x[i];
            const gammaRad = gammaDeg * Math.PI / 180;
            const sinGamma = Math.sin(gammaRad);

            let CF = 1;

            if (sinGamma < sinGamma1) {
                CF = (L / Tx) * sinGamma;
            } else if (sinGamma >= sinGamma1 && sinGamma <= sinGamma2) {
                CF = 0.5 + ((L - 2 * Delta) / (2 * Tx)) * sinGamma;
            } else {
                CF = 1;
            }

            // Prevent division by zero or negative CF issues just in case
            if (CF <= 0) CF = 1;

            correctedData.y.push(originalData.y[i] / CF);
        }
    }

    function updateDataAndPlot() {
        calculateCorrection();
        renderPlot();
    }

    function renderPlot() {
        if (originalData.x.length === 0) return;

        const isLinear = scaleToggle.value === 'linear';

        let plotYOriginal = [...originalData.y];
        let plotYCorrected = [...correctedData.y];

        if (isLinear) {
            // Normalize relative to maximum
            // The instructions say "relative to the plateau"
            // Let's normalize by the maximum value of the corrected data (which should be the plateau)
            const maxCorrected = Math.max(...correctedData.y);
            if (maxCorrected > 0) {
                plotYOriginal = plotYOriginal.map(y => y / maxCorrected);
                plotYCorrected = plotYCorrected.map(y => y / maxCorrected);
            }
        }

        const trace1 = {
            x: originalData.x,
            y: plotYOriginal,
            mode: 'markers',
            name: 'Original Data',
            marker: { size: 4, color: 'blue' }
        };

        const trace2 = {
            x: correctedData.x,
            y: plotYCorrected,
            mode: 'lines',
            name: 'Corrected Data',
            line: { width: 2, color: 'red' }
        };

        const layout = {
            title: 'XRR Footprint Correction',
            xaxis: {
                title: 'Incident Angle (°)',
                autorange: true
            },
            yaxis: {
                title: isLinear ? 'Normalized Intensity' : 'Intensity',
                type: isLinear ? 'linear' : 'log',
                autorange: true
            },
            margin: { l: 60, r: 20, t: 40, b: 40 }
        };

        // Apply manual axis ranges if set
        const xMin = parseFloat(xMinInput.value);
        const xMax = parseFloat(xMaxInput.value);
        if (!isNaN(xMin) && !isNaN(xMax) && xMin < xMax) {
            layout.xaxis.autorange = false;
            layout.xaxis.range = [xMin, xMax];
        } else if (!isNaN(xMin)) {
            layout.xaxis.autorange = false;
            const currentMax = Math.max(...originalData.x);
            layout.xaxis.range = [xMin, currentMax > xMin ? currentMax : xMin + 1];
        } else if (!isNaN(xMax)) {
            layout.xaxis.autorange = false;
            const currentMin = Math.min(...originalData.x);
            layout.xaxis.range = [currentMin < xMax ? currentMin : xMax - 1, xMax];
        }

        const yMin = parseFloat(yMinInput.value);
        const yMax = parseFloat(yMaxInput.value);
        if (!isNaN(yMin) && !isNaN(yMax) && yMin < yMax) {
            layout.yaxis.autorange = false;
            // For log scale, Plotly requires log10 values for the range array if type is 'log'
            if (!isLinear) {
                layout.yaxis.range = [
                    yMin > 0 ? Math.log10(yMin) : 0,
                    yMax > 0 ? Math.log10(yMax) : 1
                ];
            } else {
                layout.yaxis.range = [yMin, yMax];
            }
        } else if (!isNaN(yMin) || !isNaN(yMax)) {
           // We just implement autorange if both are not set for simplicity,
           // but we can try to handle partial ranges
           let currentMinY = Math.min(...plotYCorrected, ...plotYOriginal);
           let currentMaxY = Math.max(...plotYCorrected, ...plotYOriginal);
           let finalYMin = !isNaN(yMin) ? yMin : currentMinY;
           let finalYMax = !isNaN(yMax) ? yMax : currentMaxY;

           if(finalYMin >= finalYMax) finalYMax = finalYMin + 1;

           layout.yaxis.autorange = false;
           if (!isLinear) {
                layout.yaxis.range = [
                    finalYMin > 0 ? Math.log10(finalYMin) : -1,
                    finalYMax > 0 ? Math.log10(finalYMax) : 1
                ];
            } else {
                layout.yaxis.range = [finalYMin, finalYMax];
            }
        }

        Plotly.newPlot('plot', [trace1, trace2], layout);
    }

    function updatePlotLayout() {
        if (originalData.x.length > 0) {
            renderPlot();
        }
    }
</script>

</body>
</html>
