<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRR Simulated Footprint Effect</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            background-color: #f5f5f5;
        }
        .sidebar {
            width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            margin-right: 20px;
            display: flex;
            flex-direction: column;
        }
        .main {
            flex-grow: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] { flex-grow: 1; }
        .slider-container input[type="number"] { width: 70px; }
        .axis-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .axis-inputs div { flex: 1; }
        .axis-inputs input { width: 100%; box-sizing: border-box; }
        #plot { flex-grow: 1; width: 100%; }
        .file-input { margin-bottom: 20px; }
        .nav-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .nav-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Reference Data Input</h2>
    <input type="file" id="fileInput" class="file-input" accept=".csv" />

    <h2>Instrument Parameters</h2>

    <div class="control-group">
        <label>Sample Length, L (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-L" min="5" max="100" step="1" value="25" />
            <input type="number" id="num-L" min="5" max="100" step="1" value="25" />
        </div>
    </div>

    <div class="control-group">
        <label>Beam Thickness, Tx (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-Tx" min="0.01" max="1.0" step="0.01" value="0.1" />
            <input type="number" id="num-Tx" min="0.01" max="1.0" step="0.01" value="0.1" />
        </div>
    </div>

    <div class="control-group">
        <label>Lateral Displacement, &Delta; (mm)</label>
        <div class="slider-container">
            <input type="range" id="slider-Delta" min="0" max="5" step="0.1" value="0" />
            <input type="number" id="num-Delta" min="0" max="5" step="0.1" value="0" />
        </div>
    </div>

    <h2>Axis Management</h2>
    <div class="control-group">
        <label>Incident Angle (X-axis)</label>
        <div class="axis-inputs">
            <div><small>Min</small><input type="number" id="x-min" step="0.01" /></div>
            <div><small>Max</small><input type="number" id="x-max" step="0.01" /></div>
        </div>
    </div>

    <div class="control-group">
        <label>Intensity (Y-axis)</label>
        <div class="axis-inputs">
            <div><small>Min</small><input type="number" id="y-min" step="0.01" min="0" max="1" /></div>
            <div><small>Max</small><input type="number" id="y-max" step="0.01" min="0" max="1" /></div>
        </div>
    </div>

    <h2>Scaling Toggle</h2>
    <div class="control-group">
        <label>Y-Axis Scale</label>
        <select id="scale-toggle">
            <option value="linear">Linear Scale</option>
            <option value="log">Logarithmic Scale</option>
        </select>
    </div>

    <div id="disclaimer" style="margin-top: auto; font-size: 0.8rem; color: #666; padding-top: 15px; border-top: 1px solid #ccc; display: none;">
        Reference XRR data for a Cr film of 300 nm of 7.19 g/cm^3
    </div>
</div>

<div class="main">
    <div id="plot"></div>
</div>

<script>
    let originalData = { x: [], y: [] };
    let simulatedData = { x: [], y: [], zone1: [], zone2: [] };
    let criticalAngles = { gamma1: 0, gamma2: 0 };

    // Get DOM elements
    const fileInput = document.getElementById('fileInput');

    // Sliders & Numbers
    const sliderL = document.getElementById('slider-L');
    const numL = document.getElementById('num-L');
    const sliderTx = document.getElementById('slider-Tx');
    const numTx = document.getElementById('num-Tx');
    const sliderDelta = document.getElementById('slider-Delta');
    const numDelta = document.getElementById('num-Delta');

    // Axis inputs
    const xMinInput = document.getElementById('x-min');
    const xMaxInput = document.getElementById('x-max');
    const yMinInput = document.getElementById('y-min');
    const yMaxInput = document.getElementById('y-max');

    // Toggle
    const scaleToggle = document.getElementById('scale-toggle');

    // Sync Sliders and Numbers
    function syncInputs(slider, num) {
        slider.addEventListener('input', () => {
            num.value = slider.value;
            updateDataAndPlot();
        });
        num.addEventListener('input', () => {
            slider.value = num.value;
            updateDataAndPlot();
        });
    }

    syncInputs(sliderL, numL);
    syncInputs(sliderTx, numTx);
    syncInputs(sliderDelta, numDelta);

    // Update on axis/scale change
    xMinInput.addEventListener('change', updatePlotLayout);
    xMaxInput.addEventListener('change', updatePlotLayout);
    yMinInput.addEventListener('change', updatePlotLayout);
    yMaxInput.addEventListener('change', updatePlotLayout);
    scaleToggle.addEventListener('change', updateDataAndPlot);

    // CSV Parsing
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const contents = e.target.result;
            document.getElementById('disclaimer').style.display = 'none';
            parseCSV(contents);
            updateDataAndPlot();
        };
        reader.readAsText(file);
    });

    window.addEventListener('DOMContentLoaded', () => {
        fetch('Ref_Cr_719.csv')
            .then(res => res.text())
            .then(text => {
                parseCSV(text);
                document.getElementById('disclaimer').style.display = 'block';
                updateDataAndPlot();
            })
            .catch(err => console.error('Failed to load default data:', err));
    });

    function parseCSV(contents) {
        const lines = contents.split('\n');
        originalData.x = [];
        originalData.y = [];

        let isFirstLine = true;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // Skip header if present
            if (isFirstLine && isNaN(parseFloat(line.split(',')[0]))) {
                isFirstLine = false;
                continue;
            }

            const parts = line.split(',');
            if (parts.length >= 2) {
                const xVal = parseFloat(parts[0]);
                const yVal = parseFloat(parts[1]);

                if (!isNaN(xVal) && !isNaN(yVal)) {
                    originalData.x.push(xVal);
                    originalData.y.push(yVal);
                }
            }
            isFirstLine = false;
        }
    }

    function calculateSimulation() {
        if (originalData.x.length === 0) return;

        const L = parseFloat(numL.value);
        const Tx = parseFloat(numTx.value);
        const Delta = parseFloat(numDelta.value);

        const sinGamma1 = Tx / (L + 2 * Delta);
        const sinGamma2 = Tx / (L - 2 * Delta);

        // Calculate critical angles in degrees
        criticalAngles.gamma1 = Math.asin(Math.min(1, sinGamma1)) * 180 / Math.PI;
        criticalAngles.gamma2 = Math.asin(Math.min(1, sinGamma2)) * 180 / Math.PI;

        simulatedData.x = [...originalData.x];
        simulatedData.y = [];
        simulatedData.zone1 = [];
        simulatedData.zone2 = [];

        for (let i = 0; i < originalData.x.length; i++) {
            const gammaDeg = originalData.x[i];
            const gammaRad = gammaDeg * Math.PI / 180;
            const sinGamma = Math.sin(gammaRad);
            const refIntensity = originalData.y[i];

            // Calculate theoretical Zone 1 and Zone 2 intensities for reference plotting
            const z1Intensity = refIntensity * (L / Tx) * sinGamma;
            const z2Intensity = refIntensity * (0.5 + ((L - 2 * Delta) / (2 * Tx)) * sinGamma);

            simulatedData.zone1.push(z1Intensity);
            simulatedData.zone2.push(z2Intensity);

            // Piecewise logic for actual simulated intensity
            if (sinGamma < sinGamma1) {
                simulatedData.y.push(z1Intensity);
            } else if (sinGamma >= sinGamma1 && sinGamma <= sinGamma2) {
                simulatedData.y.push(z2Intensity);
            } else {
                simulatedData.y.push(refIntensity);
            }
        }
    }

    function updateDataAndPlot() {
        calculateSimulation();
        renderPlot();
    }

    function renderPlot() {
        if (originalData.x.length === 0) return;

        const isLinear = scaleToggle.value === 'linear';

        const traceRef = {
            x: originalData.x,
            y: originalData.y,
            mode: 'lines',
            name: 'Reference Data',
            line: { width: 4, color: 'blue' }
        };

        const traceSim = {
            x: simulatedData.x,
            y: simulatedData.y,
            mode: 'markers',
            name: 'Simulated Data (Effective XRR)',
            marker: { size: 8, color: 'red' }
        };

        const traceZone1 = {
            x: simulatedData.x,
            y: simulatedData.zone1,
            mode: 'lines',
            name: 'Zone 1 Curve',
            line: { dash: 'dash', width: 1, color: 'green' }
        };

        const traceZone2 = {
            x: simulatedData.x,
            y: simulatedData.zone2,
            mode: 'lines',
            name: 'Zone 2 Curve',
            line: { dash: 'dash', width: 1, color: 'orange' }
        };

        const layout = {
            title: 'Simulated Footprint Effect',
            xaxis: {
                title: 'Incident Angle (°)',
                autorange: true
            },
            yaxis: {
                title: 'Normalized intensity',
                type: isLinear ? 'linear' : 'log',
                autorange: true
            },
            margin: { l: 60, r: 20, t: 40, b: 40 },
            shapes: [
                {
                    type: 'line',
                    xref: 'x',
                    yref: 'paper',
                    x0: criticalAngles.gamma1,
                    y0: 0,
                    x1: criticalAngles.gamma1,
                    y1: 1,
                    line: {
                        color: 'gray',
                        width: 1,
                        dash: 'dot'
                    }
                },
                {
                    type: 'line',
                    xref: 'x',
                    yref: 'paper',
                    x0: criticalAngles.gamma2,
                    y0: 0,
                    x1: criticalAngles.gamma2,
                    y1: 1,
                    line: {
                        color: 'gray',
                        width: 1,
                        dash: 'dot'
                    }
                }
            ],
            annotations: [
                {
                    x: criticalAngles.gamma1,
                    y: 1.05,
                    xref: 'x',
                    yref: 'paper',
                    text: 'γ1',
                    showarrow: false,
                    font: { color: 'gray' }
                },
                {
                    x: criticalAngles.gamma2,
                    y: 1.05,
                    xref: 'x',
                    yref: 'paper',
                    text: 'γ2',
                    showarrow: false,
                    font: { color: 'gray' }
                }
            ]
        };

        // Apply manual axis ranges if set
        let xMin = parseFloat(xMinInput.value);
        let xMax = parseFloat(xMaxInput.value);
        if (isNaN(xMin) && isNaN(xMax)) {
            xMin = 0;
            xMax = 0.5;
            xMinInput.value = 0;
            xMaxInput.value = 0.5;
        }

        if (!isNaN(xMin) && !isNaN(xMax) && xMin < xMax) {
            layout.xaxis.autorange = false;
            layout.xaxis.range = [xMin, xMax];
        } else if (!isNaN(xMin)) {
            layout.xaxis.autorange = false;
            const currentMax = Math.max(...originalData.x);
            layout.xaxis.range = [xMin, currentMax > xMin ? currentMax : xMin + 1];
        } else if (!isNaN(xMax)) {
            layout.xaxis.autorange = false;
            const currentMin = Math.min(...originalData.x);
            layout.xaxis.range = [currentMin < xMax ? currentMin : xMax - 1, xMax];
        }

        let yMin = parseFloat(yMinInput.value);
        let yMax = parseFloat(yMaxInput.value);

        // Determine default bounds if user input is missing
        if (isNaN(yMin)) {
            if (isLinear) {
                yMin = 0;
            } else {
                const currentMinY = Math.min(...originalData.y, ...simulatedData.y);
                yMin = currentMinY > 0 ? currentMinY : 1e-6;
            }
        }
        if (isNaN(yMax)) {
            yMax = 1;
        }

        // Clamp user inputs strictly between 0 and 1
        yMin = Math.max(0, Math.min(yMin, 1));
        yMax = Math.max(0, Math.min(yMax, 1));

        // Ensure yMin is strictly less than yMax
        if (yMin >= yMax) {
            yMax = 1;
            if (yMin >= 1) yMin = 0;
            if (yMin >= yMax && !isLinear) {
                yMin = 1e-6;
                yMax = 1;
            } else if (yMin >= yMax) {
                yMin = 0;
                yMax = 1;
            }
        }

        layout.yaxis.autorange = false;
        if (!isLinear) {
            layout.yaxis.range = [
                yMin > 0 ? Math.log10(yMin) : -6,
                yMax > 0 ? Math.log10(yMax) : 0
            ];
        } else {
            layout.yaxis.range = [yMin, yMax];
        }

        Plotly.newPlot('plot', [traceRef, traceZone1, traceZone2, traceSim], layout);
    }

    function updatePlotLayout() {
        if (originalData.x.length > 0) {
            renderPlot();
        }
    }
</script>

</body>
</html>
